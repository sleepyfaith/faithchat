<!DOCTYPE html>
<html>
    <head>
        <title>bleh :p</title>
        <meta charset="UTF-8">
        <link rel="stylesheet" href="{{ url_for('static', filename='css/common.css') }}">
        <link rel="stylesheet" href="{{ url_for('static', filename='css/chat.css') }}">
        <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    </head>
    <body>
        <div class="app-container">
            <dialog id="create-chat-popup" class="popup"></dialog>
            <dialog id="create-server-popup" class="popup"></dialog>
            <dialog id="join-server-popup" class="popup"></dialog>
            <dialog id="settings-popup" class="popup"></dialog>

            <div id="profile-popup" class="hidden popup"></div>

            <div class="left sidebar">
                <div class="server-list" id="servers"></div>
                <div class="chat-and-profile-container">
                    <div id="server-info" class="hidden"></div>
                    <div class="chat-list container" id="chats"></div>
                    <div class="profile-edit popup hidden"></div>
                    <div id="profile-info"></div>
                </div>

            </div>
            <div class="centre-container">
                <div class="message-container" id="msg-container"></div>
                <div class="chatbox-container">
                    <textarea id="msg" placeholder="message the chat :3"></textarea>
                </div>
            </div>
            <div class="right sidebar hidden"></div>

        </div>
    </body>
    <script src="{{ url_for('static', filename='js/app.js') }}" type="module"></script>
</html>
